name: Run Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # stop the build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=artifacts,data,analysis,app
          # warn on style issues (non-blocking)
          flake8 . --count --max-line-length=120 --statistics \
            --exclude=artifacts,data,analysis,app --exit-zero

      - name: Type-check with mypy
        run: |
          mypy config.py features.py utils.py train.py api.py future_prediction.py data.py \
            --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=features \
            --cov=utils \
            --cov=train \
            --cov=data \
            --cov=api \
            --cov=explain \
            --cov=future_prediction \
            --cov=config \
            --cov=exceptions \
            --cov-report=term-missing \
            --cov-fail-under=85
